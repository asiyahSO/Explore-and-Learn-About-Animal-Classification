<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 40px;
  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: #333;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.logo {
  height: 60px;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.icon-button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

.icon-button img {
  width: 45px;
  height: 45px;
}

.icon-button:hover {
	  transform: scale(1.05);
	}

.container {
  background-color: rgba(255, 255, 255, 0.85);
  padding: 30px;
  border-radius: 15px;
  max-width: 900px;
  margin: auto;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

h2 {
  text-align: center;
  font-size: 50px;
  text-decoration: underline;
  margin-bottom: 10px;
  margin-top: -70px;
  font-family: Tagesschrift;
  color: #006a71;
}

.subtitle {
  text-align: center;
  font-size: 18px;
  margin-bottom: 30px;
}

.video-section {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.video-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #e6f7f8;
  padding: 15px 25px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0, 106, 113, 0.1);
  transition: transform 0.2s ease;
}

.video-row:hover {
  transform: scale(1.01);
}

.video-label {
  font-size: 20px;
  font-weight: bold;
  color: #004b50;
}

.video-button {
  padding: 10px 20px;
  font-size: 16px;
  background-color: #fff;
  border: 2px solid #006a71;
  color: #006a71;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.video-button:hover {
  background-color: #006a71;
  color: #fff;
}

a {
  text-decoration: none;
  color: inherit;
}
  </style>


</head>
<body>
