<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal Videos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
  
  body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 40px;
  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: #333;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.logo {
  height: 60px;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.icon-button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

.icon-button img {
  width: 45px;
  height: 45px;
}

.icon-button:hover {
  transform: scale(1.05);
}

.container {
  background-color: rgba(255, 255, 255, 0.85);
  padding: 20px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

.subtitle {
  text-align: center;
  font-size: 18px;
  margin-bottom: 30px;
}

h2 {
  text-align: center;
  font-size: 50px;
  text-decoration: underline;
  margin-bottom: 10px;
  margin-top: -70px;
  font-family: Tagesschrift;
  color: #006a71;
}

a {
  text-decoration: none;
  color: inherit;
}

.btn{
	background: #fff;
	color: #222;
	font-weight: 500;
	width: 100%;
	border: 1px solid #222;
	padding: 10px;
	margin: 10px 0;
	text-align: left;
	border-radius: 4px;
	cursor: pointer;
	transition: all 0.3s;
}

.btn:hover:not([disabled]){
	background: #222;
	color: #fff;
}

.btn:disabled{
	cursor: no-drop;
}

#next-btn{
	background:#006a71;
	color: #fff;
	width: 130px;
	border: 0;
	padding: 10px;
	margin: 20px auto 0;
	border-radius: 700px;
	cursor: pointer;
	display: none;
}

.correct{
	background: #9aeabc;
}

.incorrect{
	background: #ff9393;
}
  </style>


</head>
<body>

  <div class="top-bar">
    <img src="logo.png" alt="Zoo Logo" class="logo">
    <div class="nav-buttons">
		<a href="index.html" class="icon-button">
        <img src="back.png" alt="Back">
      </a>
      <a href="homepage.html" class="icon-button">
        <img src="home.png" alt="Home">
      </a>      
    </div>
  </div>

  <h2>GAMES</h2>
  <p class="subtitle">➤ Let's Test Your Knowledge !!!</p>

  <div class="container">
    <h3 id="question">Question goes here</h3>
	<div id="answer-buttons">
		<button class="btn">Answer 1</button>
		<button class="btn">Answer 2</button>
		<button class="btn">Answer 3</button>
		<button class="btn">Answer 4</button>
	</div>
	<button id="next-btn">Next</button>
	<div id="review-container" style="display: none; margin-top: 30px;"></div>
  </div>
  
	<audio id="correctSound" src="correct.m4a" preload="auto"></audio>
	<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>
<script src="gameScript.js"></script>

</body>
</html>
